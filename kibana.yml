server.host: "0.0.0.0"
server.publicBaseUrl: "https://${HOST_IP}:5601"
server.name: "kibana"

elasticsearch.hosts: ["https://elastic:9200"]
elasticsearch.username: "kibana_system"
elasticsearch.password: "${KIBANA_PASSWORD}"
elasticsearch.ssl.certificateAuthorities: ["config/certs/ca/ca.crt"]

xpack.security.encryptionKey: "${ENCRYPTION_KEY}"
xpack.encryptedSavedObjects.encryptionKey: "${ENCRYPTION_KEY}"
xpack.reporting.encryptionKey: "${ENCRYPTION_KEY}"

# Configurações de SSL do Servidor (Browser -> Kibana)
server.ssl.enabled: true
server.ssl.certificate: config/certs/kibana/kibana.crt
server.ssl.key: config/certs/kibana/kibana.key
server.ssl.certificateAuthorities: ["config/certs/ca/ca.crt"]

monitoring.ui.container.elasticsearch.enabled: true
